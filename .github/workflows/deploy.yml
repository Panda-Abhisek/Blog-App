name: CI/CD for Blog API Backend

on:
  push:
    paths:
      - 'blogapp/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t abhisekpanda/blog-backend:latest .
          docker push abhisekpanda/blog-backend:latest

      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull the new image
            docker pull abhisekpanda/blog-backend:latest
            
            # Stop and remove the old container
            docker stop blog-backend || true
            docker rm bloc-backend || true
            
            # Run the new container using your .env file
            docker run -d \
              --name blog-app-container \
              --network spring-network \
              -p 8082:8080 \
              --env-file ~/blog-app.env \
              -e SPRING_PROFILES_ACTIVE=prod \
              --restart always \
              abhisekpanda/blog-backend:latest
